<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub - Tu sitio de noticias moderno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header/Navbar -->
    <header class="header">
        <div class="container">
            <div class="logo-section">
                <img src="new_logo_titular rm.png" alt="NewsHub Logo" style="height: 50px; margin-bottom: 0.25rem;">
                <p class="tagline">Noticias al instante</p>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchInput" class="search-bar" placeholder="Buscar noticias...">
                <button class="search-btn">🔍</button>
            </div>

            <div class="header-controls">
                <button id="themeToggle" class="theme-toggle">🌙</button>
            </div>
        </div>
    </header>

    <!-- Navegación de Secciones -->
    <nav class="navbar">
        <div class="container">
            <ul class="nav-menu">
                <li><a href="#" class="nav-link active" data-section="all">Principal</a></li>
                <li><a href="#" class="nav-link" data-section="tecnologia">Tecnología</a></li>
                <li><a href="#" class="nav-link" data-section="deportes">Deportes</a></li>
                <li><a href="#" class="nav-link" data-section="politica">Política</a></li>
                <li><a href="#" class="nav-link" data-section="entretenimiento">Entretenimiento</a></li>
            </ul>
        </div>
    </nav>

    <!-- Carrusel de Destacados -->
    <section class="featured-section">
        <div class="container">
            <h2 class="section-title">📌 Noticias Destacadas</h2>
            <div class="carousel">
                <button class="carousel-btn prev" id="prevBtn">❮</button>
                <div class="carousel-container">
                    <div class="carousel-items" id="carouselItems">
                        <!-- Se llena con JavaScript -->
                    </div>
                </div>
                <button class="carousel-btn next" id="nextBtn">❯</button>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
        </div>
    </section>

    <!-- Artículos por Sección -->
    <main class="main-content">
        <div class="container">
            <!-- Filtro de secciones -->
            <div class="articles-header">
                <h2 class="articles-title">Últimas Noticias</h2>
                <select id="categoryFilter" class="category-filter">
                    <option value="all">Todas las categorías</option>
                    <option value="tecnologia">Tecnología</option>
                    <option value="deportes">Deportes</option>
                    <option value="politica">Política</option>
                    <option value="entretenimiento">Entretenimiento</option>
                </select>
            </div>

            <div class="articles-grid" id="articlesGrid">
                <!-- Se llena con JavaScript -->
            </div>
        </div>
    </main>

    <!-- Modal para leer artículo completo -->
    <div id="articleModal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="modalArticle"></div>
            <div class="comments-section">
                <h3>Comentarios</h3>
                <div class="add-comment">
                    <input type="text" id="commentName" placeholder="Tu nombre">
                    <textarea id="commentText" placeholder="Tu comentario..."></textarea>
                    <button id="submitComment" class="submit-btn">Enviar Comentario</button>
                </div>
                <div id="commentsList" class="comments-list">
                    <!-- Se llena con JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 NewsHub. Todos los derechos reservados.</p>
            <div class="footer-links">
                <a href="#">Sobre nosotros</a>
                <a href="#">Contacto</a>
                <a href="#">Privacidad</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
