<!DOCTYPE html>
<html>
<head>
    <title>Preview Logos</title>
    <style>
        body { 
            display: flex; 
            gap: 2rem; 
            padding: 2rem;
            background: #f5f5f5;
            font-family: Arial;
        }
        .container {
            text-align: center;
        }
        img {
            max-width: 400px;
            max-height: 400px;
            border: 1px solid #ddd;
            padding: 1rem;
            background: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Logo con fondo</h2>
        <img src="new logo titular 360.png" alt="Logo 1">
    </div>
    <div class="container">
        <h2>Logo sin fondo</h2>
        <img src="new_logo_titular rm.png" alt="Logo 2">
    </div>
</body>
</html>
